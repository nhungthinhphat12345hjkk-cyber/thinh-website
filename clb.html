<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng ký Câu Lạc Bộ</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#667eea,#764ba2);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* FORM CONTAINER */
.container{
    background:white;
    width:95%;
    max-width:750px;
    padding:35px;
    border-radius:25px;
    box-shadow:0 25px 60px rgba(0,0,0,0.3);
    animation:fadeIn 1s ease-in-out;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(30px);}
    to{opacity:1; transform:translateY(0);}
}

h1{
    text-align:center;
    margin-bottom:25px;
    background:linear-gradient(90deg,#667eea,#764ba2);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    font-size:30px;
}

/* FORM GROUP */
.form-group{
    margin-bottom:18px;
}

label{
    font-weight:600;
    display:block;
    margin-bottom:6px;
}

input,select,textarea{
    width:100%;
    padding:10px 12px;
    border-radius:10px;
    border:1px solid #ccc;
    transition:.3s;
    font-size:14px;
}

input:focus,select:focus,textarea:focus{
    border-color:#764ba2;
    box-shadow:0 0 8px rgba(118,75,162,0.4);
    outline:none;
}

/* RADIO + CHECKBOX */
.inline{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#667eea,#764ba2);
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.05);
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

/* FOOTER */
.footer{
    text-align:center;
    margin-top:20px;
    font-size:13px;
    color:#777;
}

/* RESPONSIVE */
@media(max-width:600px){
    .container{
        padding:25px;
    }
}
</style>
</head>

<body>

<div class="container">

<h1>🎉 ĐĂNG KÝ THAM GIA CÂU LẠC BỘ 🎉</h1>

<form>

<div class="form-group">
<label>Họ và tên</label>
<input type="text" placeholder="Nhập họ và tên..." required>
</div>

<div class="form-group">
<label>Lớp</label>
<input type="text" placeholder="Ví dụ: 12A2">
</div>

<div class="form-group">
<label>Email</label>
<input type="email" placeholder="example@gmail.com">
</div>

<div class="form-group">
<label>Số điện thoại</label>
<input type="tel" placeholder="0123xxxxxx">
</div>

<div class="form-group">
<label>Ngày sinh</label>
<input type="date">
</div>

<div class="form-group">
<label>Giới tính</label>
<div class="inline">
<label><input type="radio" name="gender"> Nam</label>
<label><input type="radio" name="gender"> Nữ</label>
<label><input type="radio" name="gender"> Khác</label>
</div>
</div>

<div class="form-group">
<label>Chọn câu lạc bộ muốn tham gia</label>
<select>
<option>CLB Công nghệ thông tin</option>
<option>CLB Văn nghệ</option>
<option>CLB Bóng đá</option>
<option>CLB Tiếng Anh</option>
<option>CLB Truyền thông</option>
</select>
</div>

<div class="form-group">
<label>Kỹ năng / Sở thích</label>
<div class="inline">
<label><input type="checkbox"> Lập trình</label>
<label><input type="checkbox"> Thiết kế</label>
<label><input type="checkbox"> Thuyết trình</label>
<label><input type="checkbox"> Làm việc nhóm</label>
</div>
</div>

<div class="form-group">
<label>Lý do muốn tham gia</label>
<textarea rows="4" placeholder="Viết lý do của bạn..."></textarea>
</div>

<div class="form-group">
<label>Tải ảnh đại diện</label>
<input type="file">
</div>

<div class="form-group">
<label><input type="checkbox" required> Tôi đồng ý với điều khoản của câu lạc bộ</label>
</div>

<button type="submit">🚀 GỬI ĐĂNG KÝ</button>

</form>

<div class="footer">
© 2026 - Hệ thống đăng ký Câu lạc bộ trường học
</div>

</div>

</body>
</html>
